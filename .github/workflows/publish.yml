name: Publish to Chrome Web Store

on:
  workflow_run:
    workflows: ["Version Bump"]
    types: [completed]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — build and upload but skip submit for review'
        type: boolean
        default: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    # workflow_run은 bump.yml 성공 시에만 진행
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write  # GitHub Release 생성에 필요

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # bump.yml이 retag했으므로 태그 ref로 체크아웃하면 범프 커밋을 가져옴
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 빌드 ──────────────────────────────────────────────────────────────

      - name: Install dependencies
        run: npm ci

      - name: Build & pack extension
        run: npm run pack

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=github-dev-toolkit-v${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Verify zip exists
        run: |
          if [ ! -f "${{ steps.pkg.outputs.zip }}" ]; then
            echo "ERROR: Expected zip not found: ${{ steps.pkg.outputs.zip }}"
            ls -la *.zip 2>/dev/null || echo "(no zip files present)"
            exit 1
          fi
          echo "Zip size: $(du -sh ${{ steps.pkg.outputs.zip }} | cut -f1)"

      # ── Chrome Web Store API ───────────────────────────────────────────────

      - name: Obtain OAuth2 access token
        id: cws_token
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          RESPONSE=$(curl -sS -X POST https://oauth2.googleapis.com/token \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "client_id=${CWS_CLIENT_ID}" \
            --data-urlencode "client_secret=${CWS_CLIENT_SECRET}" \
            --data-urlencode "refresh_token=${CWS_REFRESH_TOKEN}")

          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Failed to obtain access token"
            echo "$RESPONSE" | jq -r '.error_description // .error // .' >&2
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Upload new version to Chrome Web Store
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          RESPONSE=$(curl -sS -X PUT \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}" \
            -H "Authorization: Bearer ${{ steps.cws_token.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Type: application/zip" \
            --data-binary "@${{ steps.pkg.outputs.zip }}")

          echo "$RESPONSE" | jq .

          UPLOAD_STATE=$(echo "$RESPONSE" | jq -r '.uploadState // empty')
          case "$UPLOAD_STATE" in
            SUCCESS)   echo "Upload succeeded." ;;
            IN_PROGRESS) echo "Upload is in progress — continuing." ;;
            FAILURE|NOT_FOUND|"")
              echo "::error::Upload failed (uploadState=${UPLOAD_STATE})"
              echo "$RESPONSE" | jq -r '.itemError[]?.error_detail // empty' >&2
              exit 1
              ;;
          esac

      - name: Submit for review
        if: github.event.inputs.dry_run != 'true'
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: |
          RESPONSE=$(curl -sS -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${CWS_EXTENSION_ID}/publish" \
            -H "Authorization: Bearer ${{ steps.cws_token.outputs.access_token }}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0")

          echo "$RESPONSE" | jq .

          if echo "$RESPONSE" | jq -e '
            .status
            | if type == "array" then
                map(select(. == "OK" or . == "ITEM_PENDING_REVIEW")) | length > 0
              else false end' > /dev/null; then
            echo "Successfully submitted for review."
          else
            echo "::error::Publish request failed"
            echo "$RESPONSE" | jq -r '.error.message // .' >&2
            exit 1
          fi

      - name: Skip submit (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: echo "Dry run — skipping submit for review."

      # ── GitHub Release ─────────────────────────────────────────────────────

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.pkg.outputs.zip }}
