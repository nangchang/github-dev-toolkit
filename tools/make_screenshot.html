<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 크롬 웹 스토어 스크린샷 권장 사이즈 -->
  <meta name="viewport" content="width=1280, height=800, initial-scale=1.0">
  <title>Store Screenshot Maker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
    
    body {
      margin: 0;
      padding: 50px;
      background: #0d1117;
      color: #fff;
      font-family: 'Pretendard', -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      background: #238636;
      border: none;
      color: white;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: #2ea043; }
    
    input[type="text"] {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: white;
      width: 300px;
    }

    /* 스토어 이미지 캔버스 (정확히 1280x800) */
    .canvas {
      width: 1280px;
      height: 800px;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      border-radius: 12px;
      box-shadow: 0 0 0 1px #30363d;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 80px;
      box-sizing: border-box;
      transform: scale(0.6);
      transform-origin: top center;
    }

    /* 장식용 그래픽 */
    .glow {
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 400px;
      background: #238636;
      filter: blur(150px);
      opacity: 0.15;
      pointer-events: none;
    }

    .title {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -1px;
      margin: 0;
      text-align: center;
      z-index: 10;
      background: linear-gradient(to right, #fff, #8b949e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 32px;
      color: #8b949e;
      margin-top: 15px;
      margin-bottom: 60px;
      z-index: 10;
    }

    /* 이미지 드롭존 */
    .dropzone {
      width: 1000px;
      height: 520px;
      background: rgba(33, 38, 45, 0.5);
      border: 2px dashed #30363d;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b949e;
      font-size: 24px;
      z-index: 10;
      position: relative;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
      overflow: hidden;
      transition: all 0.2s;
    }

    .dropzone.active {
      border-color: #238636;
      background: rgba(35, 134, 54, 0.1);
    }

    .dropzone img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: none;
    }

    .instruction {
      text-align: center;
    }
  </style>
</head>
<body>

  <div>
    <h2>1. 사용할 문구를 적어주세요</h2>
    <div class="controls">
      <input type="text" id="titleInput" value="클릭 한 번으로 로컬 IDE 연결" placeholder="큰 제목">
      <input type="text" id="subInput" value="GitHub 코드 뷰어와 PR 화면에서 바로 열어보세요" placeholder="작은 설명">
    </div>
    
    <h2>2. 여기에 캡처한 이미지를 드래그 앤 드롭 하세요</h2>
    <p>적용이 끝나면 크롬 브라우저 우측 상단 <strong>⋮ 메뉴 > 인쇄 > 'PDF로 저장' 대신 이미지 캡처 도구</strong> 또는 <strong>확장 프로그램의 Full Page 캡처</strong>를 이용해 아래 화면만 1280x800으로 잘라 쓰시면 됩니다. <br/> (Mac의 경우 <code>Cmd+Shift+4</code> 비례에 맞춰 캡처)</p>
  </div>

  <div class="canvas" id="canvas">
    <div class="glow"></div>
    <h1 class="title" id="titleText">클릭 한 번으로 로컬 IDE 연결</h1>
    <div class="subtitle" id="subText">GitHub 코드 뷰어와 PR 화면에서 바로 열어보세요</div>
    
    <div class="dropzone" id="dropzone">
      <div class="instruction" id="dropText">
        여기에 캡처 이미지를 끌어다 놓으세요<br/>
        <span style="font-size: 16px; margin-top: 10px; display: inline-block;">(권장: GitHub 화면 캡처본)</span>
      </div>
      <img id="previewImage" src="" alt="preview">
    </div>
  </div>

  <script>
    const titleInput = document.getElementById('titleInput');
    const subInput = document.getElementById('subInput');
    const titleText = document.getElementById('titleText');
    const subText = document.getElementById('subText');
    
    const dropzone = document.getElementById('dropzone');
    const previewImage = document.getElementById('previewImage');
    const dropText = document.getElementById('dropText');

    titleInput.addEventListener('input', (e) => titleText.textContent = e.target.value);
    subInput.addEventListener('input', (e) => subText.textContent = e.target.value);

    // 드래그 앤 드롭 로직
    dropzone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropzone.classList.add('active');
    });

    dropzone.addEventListener('dragleave', () => {
      dropzone.classList.remove('active');
    });

    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('active');
      
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          previewImage.src = e.target.result;
          previewImage.style.display = 'block';
          dropText.style.display = 'none';
          dropzone.style.border = '1px solid #30363d';
        };
        reader.readAsDataURL(file);
      }
    });
  </script>
</body>
</html>
