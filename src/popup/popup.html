<!DOCTYPE html>
<html lang="">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Dev Toolkit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="container">
    <!-- 헤더 -->
    <header class="header">
      <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
            fill="currentColor" />
        </svg>
        <span class="logo-text">GitHub Dev Toolkit</span>
      </div>
      <span id="version-display" class="version-badge"></span>
    </header>

    <!-- 메인 콘텐츠 -->
    <main class="main">
      <!-- IDE 선택 섹션 -->
      <section class="section">
        <label class="section-label" for="ide-select" data-i18n="labelEditor">
          <svg class="label-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="2" width="14" height="11" rx="2" stroke="currentColor" stroke-width="1.5" />
            <path d="M5 6L3 8L5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M11 6L13 8L11 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
            <path d="M9 5L7 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </label>
        <div class="select-wrapper">
          <select id="ide-select" class="select">
            <option value="vscode">VS Code</option>
            <option value="vscode-insiders">VS Code Insiders</option>
            <option value="vscodium">VSCodium</option>
            <option value="cursor">Cursor</option>
            <option value="windsurf">Windsurf</option>
          </select>
          <svg class="select-arrow" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
      </section>

      <!-- 기본 경로 섹션 -->
      <section class="section">
        <label class="section-label" for="base-path-input" data-i18n="labelBasePath">
          <svg class="label-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M2 4.5C2 3.67 2.67 3 3.5 3H6.38C6.74 3 7.08 3.15 7.31 3.42L8 4.25H12.5C13.33 4.25 14 4.92 14 5.75V11.5C14 12.33 13.33 13 12.5 13H3.5C2.67 13 2 12.33 2 11.5V4.5Z"
              stroke="currentColor" stroke-width="1.5" />
          </svg>
        </label>
        <div class="input-wrapper">
          <input type="text" id="base-path-input" class="input" placeholder="/User/home/Github" autocomplete="off"
            spellcheck="false" />
        </div>
        <p class="hint"><span data-i18n="hintBasePath"></span><br /><span data-i18n="hintBasePathExample"></span></p>
      </section>

      <!-- 저장 버튼 -->
      <button id="save-btn" class="save-btn">
        <span id="save-btn-text" data-i18n="btnSave"></span>
        <svg id="save-icon" class="btn-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13.5 4.5L6 12L2.5 8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" />
        </svg>
      </button>
    </main>

    <!-- 상태 메시지 -->
    <div id="status-msg" class="status-msg" aria-live="polite"></div>

    <!-- 푸터 -->
    <footer class="footer">
      <p data-i18n="footerHint"></p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
